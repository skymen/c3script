<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>c3script — platformer sandbox</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
    #bar { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #161b22; }
    #bar button { padding: 6px 16px; cursor: pointer; }
    #bar code { color: #58a6ff; }
    #main { display: flex; height: calc(100% - 45px); }
    #left { padding: 12px; }
    #game { background: #000; display: block; outline: none; border: 1px solid #30363d; }
    #editor { flex: 1; height: 100%; }
  </style>
</head>
<body>
  <div id="bar">
    <button id="run">▶ Run script</button>
    <span>Click the game, then <code>← →</code> move, <code>↑ / Space</code> jump, <code>↓</code> slam. Logs in console (F12).</span>
  </div>
  <div id="main">
    <div id="left"><canvas id="game" width="640" height="360"></canvas></div>
    <div id="editor"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs" } });
    require(["vs/editor/editor.main"], async () => {
      const { startPlatformer } = await import("/sandbox/platformer.js");
      startPlatformer(window.monaco);
    });
  </script>
</body>
</html>
